# Nightly scale + large-dataset program (G6) — four parallel jobs, no duplicate 100k MinIO ingest.
#
# Relationship to PLAN_LARGE_DATASET_BENCHMARK.md (L1 = 100k × 128-dim):
#   • bench-100k          — engine SLO proof @ L1 scale (Rust `bench_cold_100k_nightly` + lib ANN gates).
#                         Same doc count as tier l1; inline MinIO ingest, not `bench-large.sh` / `queries.json`.
#   • large-dataset-program — comparison harness regression (G2 @ 10k + L1 shell dry-run G3–G5).
#                         Does NOT run ignored 100k tests (that is bench-100k only).
#                         Ends with verify-op-scaling-comparison.sh (offline op vs tpuf JSON smoke;
#                         same gate as ci.yml op-scaling-comparison — no MinIO bench / no Docker).
#   • stress-50k          — mid-tier v3 cold probed (50k); between CI 10k and nightly 100k.
#   • facts-check         — optional full `facts check` after bench-100k + stress-50k (continue-on-error).
#
# PR/push G2 lives in ci.yml `g2-minio-correctness` (+ 10k schema example). Nightly re-runs G2 inside
# large-dataset-program on schedule only — not a second 100k ingest alongside bench-100k.
name: Nightly large stress

on:
  schedule:
    # 03:00 UTC daily
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Integration/bench/stress tests spawn `openpuffer serve` via tests/common/s3_harness.rs.
  CARGO_BIN_EXE_openpuffer: ${{ github.workspace }}/target/release/openpuffer

jobs:
  # L1-scale engine gate (SPFresh/cold track). Complements large-dataset-program: proves recall,
  # candidates_ratio, storage_roundtrips @ 100k MinIO. Optional artifact: OPENPUFFER_BENCH_WRITE_RESULTS=1
  # → benchmarks/results/nightly-100k.json (G2/correctness only — not tpuf comparison latency).
  bench-100k:
    name: bench 100k + ANN lib (ignored)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench-nightly
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build openpuffer (release, bench)
        run: cargo build --release --features bench

      - name: cargo test -F bench --test bench_cold (100k ignored)
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: cargo test --release -F bench --test bench_cold -- --ignored --nocapture

      - name: cargo test --lib (100k ANN ignored)
        run: >-
          cargo test --release --lib
          -- --ignored --nocapture
          recall_at_10_100k_synthetic_at_least_point_nine
          ann_v3_built_index_object_count_100k_under_five_hundred

  # Mid-tier between CI 10k and L1 100k; independent of large-dataset-program dry-run.
  stress-50k:
    name: stress_50k (50k docs, MinIO)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: large-stress
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build openpuffer (release, large_stress)
        run: cargo build --release --features large_stress

      - name: cargo test -F large_stress --test stress_50k -- --ignored
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: cargo test --release -F large_stress --test stress_50k -- --ignored --nocapture

  # G6: large-dataset comparison program — G2 correctness @ 10k (shared synthetic-128 fixture) plus
  # `run-large-benchmark-program.sh --tier l1 --dry-run` (ingest/bench/tpuf/overlap/render fixtures).
  # Parallel with bench-100k by design: only one job performs full 100k MinIO ingest per night.
  large-dataset-program:
    name: large-dataset G2 + program dry-run (l1)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: large-dataset-nightly
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: benchmarks/requirements.txt

      - name: Build openpuffer (release, integration + bench)
        run: cargo build --release --features integration,bench

      - name: Python tooling (benchmark harness)
        run: ./scripts/install-benchmark-python-deps.sh

      # 10k only (`bench_cold` without --ignored). See job bench-100k for L1-scale engine proof.
      - name: G2 MinIO correctness gates
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: ./scripts/run-minio-correctness-gates.sh

      # Shell harness preflight aligned with tier l1 (100k manifests); no live AWS/tpuf spend.
      - name: Large-dataset program dry-run (G3–G5 harness, no AWS/tpuf secrets)
        run: ./scripts/run-large-benchmark-program.sh --tier l1 --dry-run --skip-g2

      - name: Install facts CLI
        run: curl -fsSL https://raw.githubusercontent.com/av/facts/main/install.sh | sh

      - name: facts check (bench-large, bench-tpuf)
        run: |
          facts check --tags bench-large
          facts check --tags bench-tpuf

      # Offline op vs tpuf scaling regression (committed JSON; mirrors ci.yml op-scaling-comparison).
      - name: verify-op-scaling-comparison.sh (offline; no MinIO bench)
        run: ./scripts/verify-op-scaling-comparison.sh

  # Does not need large-dataset-program (that job already runs bench-large + bench-tpuf facts).
  facts-check:
    name: facts check (optional)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [bench-100k, stress-50k]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Build openpuffer (release, integration)
        run: cargo build --release --features integration

      - name: Install facts CLI
        run: curl -fsSL https://raw.githubusercontent.com/av/facts/main/install.sh | sh

      - name: facts check
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: facts check