# Unit tests (lib) and MinIO integration tests (testcontainers; requires Docker on the runner).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Integration/bench tests spawn `openpuffer serve` via tests/common/s3_harness.rs.
  # Build release binary first; tests read this path (else target/release/openpuffer).
  CARGO_BIN_EXE_openpuffer: ${{ github.workspace }}/target/release/openpuffer

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test (unit)
        run: cargo test

      - name: synthetic-128 fixture gates (G2, no Docker)
        run: cargo test --test synthetic_workload_gate -- --nocapture

  integration:
    name: integration (MinIO / testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: integration
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build openpuffer (release, integration)
        run: cargo build --release --features integration

      - name: cargo test -F integration
        env:
          # GitHub-hosted runners: avoid Ryuk sidecar permission issues with testcontainers.
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: cargo test -F integration

  g2-minio-correctness:
    name: G2 MinIO correctness gates
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: g2-minio
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build openpuffer (release, integration + bench)
        run: cargo build --release --features integration,bench

      - name: G2 MinIO preflight (scripts/run-minio-correctness-gates.sh)
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: ./scripts/run-minio-correctness-gates.sh

      - name: Start MinIO (compose, schema ingest)
        run: ./scripts/ensure-compose-minio.sh

      - name: MinIO L1 schema example @ 10k (CI fast path)
        timeout-minutes: 25
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: ./scripts/run-minio-large-schema-example.sh --docs 10000

  bench-10k:
    name: bench 10k (MinIO cold gates)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build openpuffer (release, bench)
        run: cargo build --release --features bench

      # 10k cold gates (non-ignored): baseline, warm_vs_cold, storage_roundtrips ≤ 4.
      - name: cargo test -F bench --test bench_cold
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: cargo test -F bench --test bench_cold -- --nocapture

      - name: bench_cold_10k_warm_vs_cold (explicit CI gate)
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: cargo test -F bench --test bench_cold bench_cold_10k_warm_vs_cold -- --nocapture

      # Phase B ANN gates on 10k fixture (lib, non-ignored).
      - name: cargo test --lib (10k ANN gates)
        run: |
          cargo test --lib recall_v3_at_least_five_points_above_v2_on_10k_fixture -- --nocapture
          cargo test --lib recall_at_10_10k_with_rerank_at_least_point_nine_two -- --nocapture
          cargo test --lib ann_v3_index_object_count_100k_under_five_hundred -- --nocapture

  op-scaling-comparison:
    name: op vs tpuf scaling smoke (committed JSON)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: benchmarks/requirements.txt

      - name: Python tooling (benchmark harness)
        run: ./scripts/install-benchmark-python-deps.sh

      - name: verify-op-scaling-comparison.sh (offline; no MinIO bench)
        run: ./scripts/verify-op-scaling-comparison.sh

  facts-check:
    name: facts check
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [unit, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Build openpuffer (release, integration)
        run: cargo build --release --features integration

      - name: Install facts CLI
        run: curl -fsSL https://raw.githubusercontent.com/av/facts/main/install.sh | sh

      - name: facts check
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: facts check