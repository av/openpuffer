# Manual large-dataset harness preflight (dry-run only; no AWS / tpuf secrets).
# Validates workloads, scripts, report merge, and @spec facts before operator spend.
#
# Optional LIVE runs (repository secrets, disabled by default):
#   .github/workflows/benchmark-large-live.yml
#   docs/BENCHMARKS_GITHUB_ACTIONS_SECRETS.md
name: Large-dataset benchmark (dispatch)

on:
  workflow_dispatch:
    inputs:
      tier:
        description: Workload tier (l1=100k, l2=500k, l3=1M) — informational; verify runs all tiers
        required: true
        default: l1
        type: choice
        options:
          - l1
          - l2
          - l3

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  dry-run-gates:
    name: offline harness verify (${{ inputs.tier }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: benchmark-large-dispatch

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: benchmarks/requirements.txt

      - name: Python tooling (benchmark harness)
        run: ./scripts/install-benchmark-python-deps.sh

      - name: Install facts CLI
        run: curl -fsSL https://raw.githubusercontent.com/av/facts/main/install.sh | sh

      - name: preflight-large-benchmark-all.sh (G3+G4 offline, skip overlap)
        run: ./scripts/preflight-large-benchmark-all.sh --skip-overlap --tier "${{ inputs.tier }}"

      - name: verify-large-benchmark-program.sh (all offline gates)
        run: ./scripts/verify-large-benchmark-program.sh